name: scraping

on:
  schedule:
    # GitHub cron 은 UTC 기준. 23/51분은 정각 부하를 피하기 위해 선택.
    # KST 도 분 단위는 동일하므로 매시 23분, 51분에 실행됨.
    - cron: '23 * * * *'
    - cron: '51 * * * *'
  workflow_dispatch:
    inputs:
      source:
        description: '호출 소스'
        required: false
        default: 'manual'

# GITHUB_TOKEN 에 쓰기 권한을 명시적으로 부여
permissions:
  contents: write

# 같은 워크플로우가 중첩 실행되어 push 충돌나는 것을 방지
concurrency:
  group: scraping-${{ github.ref }}
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0   # rebase 를 위해 전체 히스토리 받기

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 패키지 설치
        run: |
          pip install playwright beautifulsoup4
          playwright install --with-deps chromium

      - name: 수집 실행
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event.inputs.source }}" = "cron" ]; then
            python scraper.py --event schedule
          else
            python scraper.py --event workflow_dispatch
          fi

      - name: 결과 커밋 & 푸시
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add kyobo_bestseller.csv aladin_bestseller.csv yes24_bestseller.csv history.json

          # 변경 없으면 그냥 종료 (실패 X)
          if git diff --staged --quiet; then
            echo "변경 사항 없음 — 커밋 생략"
            exit 0
          fi

          git commit -m "자동 수집: $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M') KST"

          # 동시 실행이나 외부 push 와의 충돌을 견디기 위한 재시도 로직
          for i in 1 2 3; do
            git pull --rebase origin master && git push origin master && exit 0
            echo "push 시도 $i 실패, 2초 후 재시도..."
            sleep 2
          done
          echo "::error::push 3회 모두 실패"
          exit 1