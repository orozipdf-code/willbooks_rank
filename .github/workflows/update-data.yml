name: 교보문고 베스트 수집
on:
  schedule:
    - cron: '23 * * * *'
    - cron: '51 * * * *'
  workflow_dispatch:
    inputs:
      source:
        description: '호출 소스'
        required: false
        default: 'manual'
jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: 패키지 설치
        run: |
          pip install playwright beautifulsoup4
          playwright install chromium
          playwright install-deps chromium
      - name: 수집 실행
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ "${{ github.event.inputs.source }}" = "cron" ]; then
            python scraper.py --event schedule
          else
            python scraper.py --event workflow_dispatch
          fi
      - name: 결과 저장
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add kyobo_bestseller.csv aladin_bestseller.csv yes24_bestseller.csv history.json
          git diff --staged --quiet || git commit -m "자동 수집: $(TZ='Asia/Seoul' date '+%Y-%m-%d %H:%M') KST"
      - name: Push changes
        run: |
          git pull origin master --rebase
          git push origin master
