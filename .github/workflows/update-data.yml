name: Run My Own Scraper

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - run: pip install requests beautifulsoup4
      - run: python scraper.py
      - run: |
          git config --global user.name 'GitHub Actions Bot'
          git config --global user.email 'actions@github.com'
          git add yes24_bestseller.csv aladin_bestseller.csv kyobo_bestseller.csv history.json
          git commit -m "Update Chart Data" || exit 0
          git push